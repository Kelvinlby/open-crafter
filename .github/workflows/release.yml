name: Release

# Compiles release builds for Linux, macOS and Windows and uploads distributable
# packages as workflow artifacts (7-day retention). On manual runs it can also
# publish a draft GitHub Release with everything attached.
#
# Runs on every push (commit) to main and on manual dispatch.
# Builds are UNSIGNED. See packaging notes / plan for how to add code signing later.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (used for artifact + installer + release tag names)"
        required: true
        default: "1.0.0"
      make_release:
        description: "Publish a draft GitHub Release with the built artifacts"
        type: boolean
        required: false
        default: false

env:
  FLUTTER_VERSION: "3.44.1"

# Note: on push events the workflow_dispatch `version` input is empty, so each build job has
# a "Determine version" step that falls back to the short commit SHA and exports VERSION.

jobs:
  build-linux:
    name: Linux (.deb + .rpm)
    # Build on an older glibc for broader runtime compatibility than ubuntu-latest (24.04).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        # flutter_distributor derives the .deb/.rpm version from pubspec's `version:` field.
        # Its deb maker requires the build number (the part after '+') to be an INTEGER, so
        # the commit SHA can't go there — it goes in the name part, with the run number as
        # the integer build number: e.g. 0.0.0.1a2b3c4+42. A manual `version` input is used
        # verbatim (a '+<int>' build number is appended if it lacks one).
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            case "${{ inputs.version }}" in
              *+*) VERSION="${{ inputs.version }}" ;;
              *)   VERSION="${{ inputs.version }}+${GITHUB_RUN_NUMBER}" ;;
            esac
          else
            VERSION="0.0.0.${GITHUB_SHA::7}+${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            rpm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Package .deb and .rpm
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor package \
            --platform linux \
            --targets deb,rpm \
            --flutter-build-args=release

      - uses: actions/upload-artifact@v5
        with:
          name: linux-packages
          path: |
            dist/**/*.deb
            dist/**/*.rpm
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: macOS (.app)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        # Use the manual `version` input if given, otherwise the short commit SHA.
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build release (ad-hoc / unsigned)
        # The Xcode project already sets CODE_SIGN_IDENTITY = "-" (Sign to Run Locally)
        # with no DEVELOPMENT_TEAM, so a plain release build is ad-hoc signed — which is
        # the signature Apple Silicon needs to launch, without requiring a Developer ID.
        run: flutter build macos --release

      - name: Zip the .app
        run: |
          ditto -c -k --keepParent \
            "build/macos/Build/Products/Release/open_crafter.app" \
            "open_crafter-${VERSION}-macos-app.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: macos-app
          path: open_crafter-*-macos-app.zip
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Windows (installer .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        # Use the manual `version` input if given, otherwise the short commit SHA.
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Build installer with Inno Setup
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ env.VERSION }}" `
            "packaging\windows\open_crafter.iss"

      - uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: packaging/windows/installer/*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: ${{ inputs.make_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Open Crafter v${{ inputs.version }}
          draft: true
          files: |
            artifacts/linux-packages/**/*.deb
            artifacts/linux-packages/**/*.rpm
            artifacts/macos-app/*-macos-app.zip
            artifacts/windows-installer/*.exe
