name: Release

# Compiles release builds for Linux, macOS and Windows and uploads distributable
# packages as workflow artifacts (7-day retention). On manual runs it can also
# publish a draft GitHub Release with everything attached.
#
# Runs on every push (commit) to main and on manual dispatch.
# Builds are UNSIGNED. See packaging notes / plan for how to add code signing later.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (used for artifact + installer + release tag names)"
        required: true
        default: "1.0.0"
      make_release:
        description: "Publish a draft GitHub Release with the built artifacts"
        type: boolean
        required: false
        default: false

env:
  FLUTTER_VERSION: "3.44.1"

# Note: on push events the workflow_dispatch `version` input is empty, so each build job has
# a "Determine version" step that falls back to the short commit SHA and exports VERSION.

jobs:
  build-linux:
    name: Linux (.deb + .rpm)
    # Build on an older glibc for broader runtime compatibility than ubuntu-latest (24.04).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        # flutter_distributor reads the version from pubspec's `version:` (parsed as semver),
        # then uses it for both the .deb and .rpm `Version`. The commit SHA goes in semver
        # build-metadata (after '+') — the legit place for it: valid pub_semver, a valid .deb
        # upstream version (e.g. 0.0.0+1a2b3c4), and the .rpm maker maps it to `Release`.
        # (A pre-release like 0.0.0-rc.1 would be rejected by .rpm, which forbids '-'.)
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="0.0.0+${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            rpm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Package .deb and .rpm
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor package \
            --platform linux \
            --targets deb,rpm \
            --flutter-build-args=release

      - name: Resolve package paths
        # Name each artifact after the actual generated file (GitHub still wraps it in a .zip).
        shell: bash
        run: |
          deb=$(find dist -name '*.deb' | head -1)
          rpm=$(find dist -name '*.rpm' | head -1)
          echo "DEB_PATH=$deb" >> "$GITHUB_ENV"
          echo "RPM_PATH=$rpm" >> "$GITHUB_ENV"
          echo "DEB_NAME=$(basename "$deb" .deb)" >> "$GITHUB_ENV"
          echo "RPM_NAME=$(basename "$rpm" .rpm)" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DEB_NAME }}.deb
          path: ${{ env.DEB_PATH }}
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RPM_NAME }}.rpm
          path: ${{ env.RPM_PATH }}
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: macOS (.app)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        # Use the manual `version` input if given, otherwise the short commit SHA.
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build release (ad-hoc / unsigned)
        # The Xcode project already sets CODE_SIGN_IDENTITY = "-" (Sign to Run Locally)
        # with no DEVELOPMENT_TEAM, so a plain release build is ad-hoc signed — which is
        # the signature Apple Silicon needs to launch, without requiring a Developer ID.
        run: flutter build macos --release

      - name: Zip the .app
        # ditto preserves the bundle's symlinks, permissions and ad-hoc signature — uploading
        # the raw .app dir via upload-artifact would flatten symlinks and break the bundle.
        run: |
          ditto -c -k --keepParent \
            "build/macos/Build/Products/Release/Open Crafter.app" \
            "open_crafter-${VERSION}.app.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: open_crafter-${{ env.VERSION }}-darwin
          path: open_crafter-*.app.zip
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Windows (installer .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        # Use the manual `version` input if given, otherwise the short commit SHA.
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Build installer with Inno Setup
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ env.VERSION }}" `
            "packaging\windows\open_crafter.iss"

      - uses: actions/upload-artifact@v7
        with:
          # GitHub still wraps it in a .zip; the installer inside is open_crafter-<ver>-setup.exe.
          name: open_crafter-${{ env.VERSION }}-windows
          path: packaging/windows/installer/*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: ${{ inputs.make_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Open Crafter v${{ inputs.version }}
          draft: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.app.zip
            artifacts/**/*.exe
