name: Release

# Compiles release builds for Linux, macOS and Windows and uploads distributable
# packages as workflow artifacts (7-day retention). On manual runs it can also
# publish a draft GitHub Release with everything attached.
#
# Runs on every push (commit) and on manual dispatch.
# Builds are UNSIGNED. See packaging notes / plan for how to add code signing later.
on:
  push:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (used for artifact + installer + release tag names)"
        required: true
        default: "1.0.0"
      make_release:
        description: "Publish a draft GitHub Release with the built artifacts"
        type: boolean
        required: false
        default: false

env:
  FLUTTER_VERSION: "3.44.1"

# Note: on push events the workflow_dispatch inputs are empty, so version references use
# `${{ inputs.version || '1.0.0' }}` to fall back to a default. (A workflow-level env var
# can't be reused here because the `env` context isn't allowed inside an `env:` block.)

jobs:
  build-linux:
    name: Linux (.deb + .rpm)
    # Build on an older glibc for broader runtime compatibility than ubuntu-latest (24.04).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            rpm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Package .deb and .rpm
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor package \
            --platform linux \
            --targets deb,rpm \
            --flutter-build-args=release

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/**/*.deb
            dist/**/*.rpm
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: macOS (.app + .dmg)
    runs-on: macos-14
    env:
      VERSION: ${{ inputs.version || '1.0.0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build release (ad-hoc / unsigned)
        # The Xcode project already sets CODE_SIGN_IDENTITY = "-" (Sign to Run Locally)
        # with no DEVELOPMENT_TEAM, so a plain release build is ad-hoc signed — which is
        # the signature Apple Silicon needs to launch, without requiring a Developer ID.
        run: flutter build macos --release

      - name: Create .dmg
        run: |
          brew install create-dmg
          APP="build/macos/Build/Products/Release/open_crafter.app"
          DMG="open_crafter-${VERSION}.dmg"
          # create-dmg can return non-zero on CI even when the .dmg is produced;
          # fall back to a plain hdiutil image if the styled build fails.
          create-dmg \
            --volname "Open Crafter" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "open_crafter.app" 150 200 \
            --app-drop-link 450 200 \
            "$DMG" "$APP" \
          || hdiutil create -volname "Open Crafter" -srcfolder "$APP" -ov -format UDZO "$DMG"

      - name: Zip the .app
        run: |
          ditto -c -k --keepParent \
            "build/macos/Build/Products/Release/open_crafter.app" \
            "open_crafter-${VERSION}-macos-app.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            open_crafter-*.dmg
            open_crafter-*-macos-app.zip
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Windows (installer .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Build installer with Inno Setup
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ inputs.version || '1.0.0' }}" `
            "packaging\windows\open_crafter.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/windows/installer/*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: ${{ inputs.make_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Open Crafter v${{ inputs.version }}
          draft: true
          files: |
            artifacts/linux-packages/**/*.deb
            artifacts/linux-packages/**/*.rpm
            artifacts/macos-packages/*.dmg
            artifacts/macos-packages/*-macos-app.zip
            artifacts/windows-installer/*.exe
